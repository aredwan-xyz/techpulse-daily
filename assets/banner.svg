<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 160" width="100%">
<defs>
  <!-- Subtle radial glow at top-center for depth -->
  <radialGradient id="glow" cx="50%" cy="0%" r="65%">
    <stop offset="0%"   stop-color="#1f6feb" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
  </radialGradient>
  <!-- Accent line gradient: fade in from edges, brightest at center -->
  <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0"/>
    <stop offset="25%"  stop-color="#38bdf8" stop-opacity="0.7"/>
    <stop offset="50%"  stop-color="#38bdf8" stop-opacity="1"/>
    <stop offset="75%"  stop-color="#38bdf8" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="840" height="160" fill="#0d1117"/>
<!-- Radial depth glow -->
<rect width="840" height="160" fill="url(#glow)"/>

<!-- Title -->
<text x="420" y="82"
      text-anchor="middle"
      font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
      font-size="46" font-weight="700" fill="#e6edf3" letter-spacing="-1">
  TechPulse Daily Digest
</text>

<!-- Gradient accent line -->
<rect x="170" y="98" width="500" height="1.5" fill="url(#line)" rx="1"/>

<!-- Subtitle -->
<text x="420" y="127"
      text-anchor="middle"
      font-family="'SFMono-Regular',Consolas,'Liberation Mono',monospace"
      font-size="11" fill="#38bdf8" letter-spacing="3" opacity="0.75">
  AI  ·  GITHUB ACTIONS  ·  GEMINI
</text>

<!-- Bottom micro-text -->
<text x="420" y="150"
      text-anchor="middle"
      font-family="'SFMono-Regular',Consolas,monospace"
      font-size="9" fill="#30363d" letter-spacing="1">
  github.com/aredwan-xyz/techpulse-daily
</text>
</svg>
