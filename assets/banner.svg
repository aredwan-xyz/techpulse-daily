<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 220" width="100%">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#0d1117"/>
    <stop offset="50%"  stop-color="#0a1929"/>
    <stop offset="100%" stop-color="#0d1f30"/>
  </linearGradient>
  <!-- Title glow -->
  <filter id="tg" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>
    <feFlood flood-color="#38bdf8" flood-opacity="0.55" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .t { font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; }

    /* Subtitle cycle — 12s total, 4s each */
    @keyframes s0 { 0%,1%{opacity:1} 30%{opacity:1} 34%,100%{opacity:0} }
    @keyframes s1 { 0%,33%{opacity:0} 37%{opacity:1} 63%{opacity:1} 67%,100%{opacity:0} }
    @keyframes s2 { 0%,66%{opacity:0} 70%{opacity:1} 97%{opacity:1} 100%{opacity:0} }
    .c0 { animation:s0 12s linear infinite }
    .c1 { animation:s1 12s linear infinite }
    .c2 { animation:s2 12s linear infinite }

    /* Cursor blink */
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cur { animation:blink 0.85s linear infinite }

    /* LIVE dot sonar */
    @keyframes sonar { 0%{r:4;opacity:.8} 100%{r:12;opacity:0} }
    .sr { animation:sonar 1.6s ease-out infinite }

    /* Particle drift */
    @keyframes fa { 0%,100%{opacity:.07} 50%{opacity:.55} }
    @keyframes fb { 0%,100%{opacity:.1}  50%{opacity:.45} }
    @keyframes fc { 0%,100%{opacity:.05} 50%{opacity:.6}  }
  </style>
</defs>

<!-- ═══ OUTER CARD ═══ -->
<rect width="840" height="220" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

<!-- ═══ TERMINAL TITLE BAR ═══ -->
<rect x="0" y="0" width="840" height="34" rx="10" fill="#161b22"/>
<rect x="0" y="24" width="840" height="10" fill="#161b22"/>
<line x1="0" y1="34" x2="840" y2="34" stroke="#30363d" stroke-width="1"/>
<!-- Traffic-light dots -->
<circle cx="20" cy="17" r="5.5" fill="#ff5f57"/>
<circle cx="36" cy="17" r="5.5" fill="#febc2e"/>
<circle cx="52" cy="17" r="5.5" fill="#28c840"/>
<!-- Window title -->
<text x="420" y="22" text-anchor="middle" class="t" fill="#484f58" font-size="10">techpulse-daily — zsh</text>

<!-- ═══ MAIN BG ═══ -->
<rect x="0" y="34" width="840" height="186" fill="url(#bg)"/>

<!-- Corner accent rings (top-left & bottom-right diagonal) -->
<circle cx="0"   cy="34"  r="85"  fill="none" stroke="#1f6feb" stroke-width="0.6" opacity="0.18"/>
<circle cx="0"   cy="34"  r="125" fill="none" stroke="#1f6feb" stroke-width="0.5" opacity="0.09"/>
<circle cx="840" cy="220" r="85"  fill="none" stroke="#1f6feb" stroke-width="0.6" opacity="0.18"/>
<circle cx="840" cy="220" r="125" fill="none" stroke="#1f6feb" stroke-width="0.5" opacity="0.09"/>

<!-- Scattered particles -->
<circle cx="55"  cy="55"  r="1.5" fill="#38bdf8"><animate attributeName="opacity" values=".07;.55;.07" dur="3.2s" begin="0s"   repeatCount="indefinite"/></circle>
<circle cx="118" cy="105" r="1"   fill="#58a6ff"><animate attributeName="opacity" values=".1;.45;.1"   dur="4.1s" begin="0.5s" repeatCount="indefinite"/></circle>
<circle cx="195" cy="44"  r="2"   fill="#38bdf8"><animate attributeName="opacity" values=".06;.6;.06"  dur="3.7s" begin="1.1s" repeatCount="indefinite"/></circle>
<circle cx="278" cy="172" r="1.5" fill="#58a6ff"><animate attributeName="opacity" values=".09;.5;.09"  dur="5.0s" begin="0.3s" repeatCount="indefinite"/></circle>
<circle cx="355" cy="58"  r="1"   fill="#38bdf8"><animate attributeName="opacity" values=".1;.42;.1"   dur="3.5s" begin="1.8s" repeatCount="indefinite"/></circle>
<circle cx="420" cy="190" r="2"   fill="#58a6ff"><animate attributeName="opacity" values=".07;.52;.07" dur="4.4s" begin="0.7s" repeatCount="indefinite"/></circle>
<circle cx="498" cy="46"  r="1.5" fill="#38bdf8"><animate attributeName="opacity" values=".11;.5;.11"  dur="3.9s" begin="2.2s" repeatCount="indefinite"/></circle>
<circle cx="565" cy="130" r="1"   fill="#79c0ff"><animate attributeName="opacity" values=".08;.44;.08" dur="4.8s" begin="0.9s" repeatCount="indefinite"/></circle>
<circle cx="640" cy="75"  r="2"   fill="#38bdf8"><animate attributeName="opacity" values=".06;.58;.06" dur="3.3s" begin="1.4s" repeatCount="indefinite"/></circle>
<circle cx="705" cy="162" r="1.5" fill="#58a6ff"><animate attributeName="opacity" values=".1;.43;.1"   dur="4.6s" begin="0.2s" repeatCount="indefinite"/></circle>
<circle cx="760" cy="50"  r="1"   fill="#38bdf8"><animate attributeName="opacity" values=".09;.5;.09"  dur="3.8s" begin="1.6s" repeatCount="indefinite"/></circle>
<circle cx="805" cy="120" r="2"   fill="#79c0ff"><animate attributeName="opacity" values=".07;.48;.07" dur="4.2s" begin="0.4s" repeatCount="indefinite"/></circle>
<circle cx="88"  cy="168" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values=".12;.46;.12" dur="5.1s" begin="2.0s" repeatCount="indefinite"/></circle>
<circle cx="460" cy="155" r="1"   fill="#58a6ff"><animate attributeName="opacity" values=".08;.53;.08" dur="3.6s" begin="1.2s" repeatCount="indefinite"/></circle>
<circle cx="728" cy="95"  r="1.5" fill="#38bdf8"><animate attributeName="opacity" values=".1;.47;.1"   dur="4.3s" begin="0.6s" repeatCount="indefinite"/></circle>

<!-- ═══ LIVE BADGE ═══ -->
<rect x="750" y="46" width="68" height="22" rx="11" fill="#0d1f0d" stroke="#3fb950" stroke-width="1"/>
<circle cx="764" cy="57" r="4.5" fill="#3fb950"/>
<circle cx="764" cy="57" r="4.5" fill="#3fb950" class="sr"/>
<text x="773"   cy="57" y="61"   class="t" fill="#3fb950" font-size="10" font-weight="bold">LIVE</text>

<!-- ═══ PROMPT LINE ═══ -->
<text x="40" y="88" class="t" fill="#484f58" font-size="11">$</text>
<text x="56" y="88" class="t" fill="#6e7681" font-size="11">cat README.md | grep title</text>

<!-- ═══ TITLE ═══ -->
<text x="420" y="126" text-anchor="middle" class="t" fill="#38bdf8" font-size="40" font-weight="bold" filter="url(#tg)">TechPulse Daily Digest</text>

<!-- Scanning accent line -->
<rect x="170" y="140" width="500" height="1" fill="#21262d" rx="0.5"/>
<rect x="170" y="139" width="80"  height="2" rx="1" fill="#38bdf8" opacity="0.75">
  <animate attributeName="x" values="170;590;170" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
</rect>

<!-- ═══ CYCLING SUBTITLES ═══ -->
<text x="415" y="168" text-anchor="middle" class="t c0" fill="#8b949e" font-size="13">🤖  AI-powered daily intelligence feed for developers</text>
<text x="415" y="168" text-anchor="middle" class="t c1" fill="#8b949e" font-size="13">⚡  10 commits/day · GitHub Actions + Gemini AI</text>
<text x="415" y="168" text-anchor="middle" class="t c2" fill="#8b949e" font-size="13">📰  News · Research · Challenges · Tools · Security</text>
<!-- Blinking cursor (static position, appears after text) -->
<text x="644" y="168" class="t cur" fill="#38bdf8" font-size="13">▋</text>

<!-- ═══ BOTTOM LINE ═══ -->
<text x="420" y="200" text-anchor="middle" class="t" fill="#30363d" font-size="9">github.com/aredwan-xyz/techpulse-daily · Star to subscribe · Fork to run your own</text>
</svg>
