<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 278" width="100%">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#0d2137"/>
  </linearGradient>
  <style>
    .t  { font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; }
    .cn { fill:#8b949e; font-size:9px; }
    .ca { fill:#e6edf3; font-size:9px; font-weight:bold; }
    .ct { fill:#484f58; font-size:8px; }
    .cta{ fill:#8b949e; font-size:8px; }

    /* Sequential card activation — 10s cycle, each card on for 1s */
    @keyframes pulse {
      0%,100%{ opacity:0 }
      1%      { opacity:1 }
      9%      { opacity:1 }
      10%     { opacity:0 }
    }
    .a0{ animation:pulse 10s  0s linear infinite }
    .a1{ animation:pulse 10s -9s linear infinite }
    .a2{ animation:pulse 10s -8s linear infinite }
    .a3{ animation:pulse 10s -7s linear infinite }
    .a4{ animation:pulse 10s -6s linear infinite }
    .a5{ animation:pulse 10s -5s linear infinite }
    .a6{ animation:pulse 10s -4s linear infinite }
    .a7{ animation:pulse 10s -3s linear infinite }
    .a8{ animation:pulse 10s -2s linear infinite }
    .a9{ animation:pulse 10s -1s linear infinite }

    /* Progress bar sweeps across in 10s */
    @keyframes prog { from{width:0} to{width:798px} }
    .pb{ animation:prog 10s linear infinite }

    /* Loop label blink */
    @keyframes bl { 0%,100%{opacity:.45} 50%{opacity:1} }
    .bl{ animation:bl 2s ease-in-out infinite }

    /* Dot ring pulse */
    @keyframes ring { 0%,100%{opacity:.35;r:8} 50%{opacity:.1;r:13} }
    .ring{ animation:ring 1s ease-out infinite }
  </style>
</defs>

<!-- Background -->
<rect width="840" height="278" fill="url(#bg)" rx="10"/>

<!-- Header -->
<text x="420" y="27" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold" class="t">⚙️  GitHub Actions · Daily Automation Loop</text>
<text x="420" y="43" text-anchor="middle" fill="#6e7681" font-size="9" class="t">10 scheduled jobs · auto-commits content every day · 06:00 – 10:15 UTC</text>

